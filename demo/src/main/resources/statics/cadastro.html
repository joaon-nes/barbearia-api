<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
        }

        .app-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .btn-custom {
            background-color: #d4af37;
            color: #121212;
            font-weight: bold;
            border-radius: 25px;
            padding: 12px;
        }

        .btn-custom:hover {
            background-color: #b5952f;
        }

        .form-floating .form-control {
            background-color: #2c2c2c;
            color: #fff;
            border: none;
            border-radius: 15px;
        }

        .form-floating label {
            color: #aaa;
        }

        .form-control:focus {
            background-color: #2c2c2c;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }

        .form-check-input:checked {
            background-color: #d4af37;
            border-color: #d4af37;
        }
    </style>
</head>

<body class="d-flex align-items-center min-vh-100 py-4">

    <div class="app-container w-100">
        <h2 class="text-center mb-4">Criar Conta</h2>
        <p class="text-center text-muted mb-4">Preencha os seus dados para começar.</p>

        <form id="formCadastro">
            <div class="mb-3 px-2">
                <label class="form-label text-muted mb-2 d-block">Eu sou um:</label>
                <div class="d-flex gap-4 flex-wrap">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipoConta" id="tipoCliente" value="CLIENTE"
                            checked>
                        <label class="form-check-label" for="tipoCliente">Cliente</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipoConta" id="tipoEstabelecimento"
                            value="ESTABELECIMENTO">
                        <label class="form-check-label" for="tipoEstabelecimento">Estabelecimento</label>
                    </div>
                </div>
            </div>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nomeCadastro" placeholder="O seu Nome" required>
                <label for="nomeCadastro">Nome Completo</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailCadastro" placeholder="nome@exemplo.com" required>
                <label for="emailCadastro">E-mail</label>
            </div>

            <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="telefoneCadastro" placeholder="(00) 00000-0000" required>
                <label for="telefoneCadastro">Telefone / WhatsApp</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="senhaCadastro" placeholder="Palavra-passe" required>
                <label for="senhaCadastro">Palavra-passe (Senha)</label>
            </div>

            <button type="submit" class="btn btn-custom w-100 mb-3">Criar Minha Conta</button>
        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="text-decoration-none text-muted">← Voltar para o Login</a>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
</body>

</html>
