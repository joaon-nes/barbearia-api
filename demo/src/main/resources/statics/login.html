<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F8F6F0;
            color: #333333;
        }

        .app-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .brand-logo {
            width: 90px;
            height: 90px;
            background-color: #2C4E80;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            color: #F8F6F0;
            font-size: 40px;
        }

        .btn-custom {
            background-color: #2C4E80;
            color: #ffffff;
            font-weight: bold;
            border-radius: 25px;
            padding: 12px;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #1c365d;
            color: #ffffff;
        }

        .form-floating .form-control {
            background-color: #F8F6F0;
            border: 1px solid #e0dcd3;
            border-radius: 10px;
            color: #333;
        }

        .form-floating label {
            color: #666;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #2C4E80;
            box-shadow: 0 0 0 0.25rem rgba(44, 78, 128, 0.25);
        }

        .text-primary-custom {
            color: #2C4E80;
        }
    </style>
</head>

<body class="d-flex align-items-center vh-100">

    <div class="app-container w-100">
        <div class="brand-logo">💈</div>
        <h2 class="text-center mb-4 text-primary-custom fw-bold">Bem-vindo</h2>

        <form id="formLogin">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailLogin" placeholder="nome@exemplo.com" required>
                <label for="emailLogin">E-mail</label>
            </div>

            <div class="form-floating mb-2">
                <input type="password" class="form-control" id="senhaLogin" placeholder="Palavra-passe" required>
                <label for="senhaLogin">Senha</label>
            </div>

            <div class="text-end mb-4 px-2">
                <a href="#" class="text-decoration-none text-muted" style="font-size: 0.9em;">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn btn-custom w-100 mb-3">Entrar</button>
        </form>

        <div id="area2FA" class="mt-3" style="display: none;">
            <hr style="border-color: #e0dcd3;">
            <p class="text-center text-primary-custom mb-3 fw-bold">Enviamos um código para seu e-mail!</p>
            <form id="form2FA">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control text-center text-primary-custom fw-bold" id="codigo2faInput"
                        placeholder="A1b2C3" maxlength="6" required style="font-size: 1.5rem; letter-spacing: 5px;">
                    <label for="codigo2faInput">Código 2FA</label>
                </div>
                <button type="submit" class="btn btn-outline-primary w-100 fw-bold" style="border-radius: 25px;">Validar
                    Código</button>
            </form>
        </div>

        <div class="text-center mt-4">
            <p class="mb-0 text-muted">Ainda não tem uma conta?</p>
            <a href="cadastro.html" class="text-decoration-none text-primary-custom fw-bold">Cadastre-se aqui</a>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
</body>

</html>
