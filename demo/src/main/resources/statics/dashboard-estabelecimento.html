<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Painel de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F8F6F0;
            color: #333333;
        }

        .navbar-custom {
            background-color: #2C4E80;
            border-bottom: 3px solid #e0dcd3;
        }

        .navbar-brand,
        .nav-text {
            color: #F8F6F0 !important;
        }

        .card-custom {
            background-color: #ffffff;
            border: 1px solid #e0dcd3;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .text-primary-custom {
            color: #2C4E80;
        }

        .btn-outline-custom {
            border: 1px solid #2C4E80;
            color: #2C4E80;
            transition: 0.3s;
        }

        .btn-outline-custom:hover {
            background-color: #2C4E80;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">💈 Gestão da Barbearia</a>
            <div class="d-flex align-items-center">
                <span id="nomeAdmin" class="me-3 nav-text fw-bold"></span>
                <button onclick="logout()"
                    class="btn btn-light btn-sm rounded-pill text-primary-custom fw-bold px-3">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h3 class="mb-4 text-primary-custom fw-bold">Visão Geral</h3>

        <div class="row g-4">
            <div class="col-md-12">
                <div class="card card-custom p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="text-primary-custom fw-bold m-0">Agenda do Dia</h4>
                        <button class="btn btn-sm btn-outline-custom rounded-pill px-3">Ver Todos</button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mt-3">
                            <thead class="table-light">
                                <tr>
                                    <th>Horário</th>
                                    <th>Cliente</th>
                                    <th>Serviço</th>
                                    <th>Status</th>
                                    <th>Ação</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaAgenda">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">Nenhum agendamento carregado
                                        ainda.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const usuarioAtual = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioAtual || usuarioAtual.role !== 'ESTABELECIMENTO') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('nomeAdmin').innerText = usuarioAtual.nome;
        }

        function logout() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'login.html';
        }

        async function carregarAgendamentos() {
            try {
                const response = await fetch('http://localhost:8080/api/agendamentos');
                if (response.ok) {
                    const agendamentos = await response.json();
                    const tbody = document.getElementById('tabelaAgenda');
                    tbody.innerHTML = '';

                    if (agendamentos.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Nenhum agendamento carregado ainda.</td></tr>';
                        return;
                    }

                    agendamentos.forEach(ag => {
                        const dataFormatada = new Date(ag.dataHoraInicio).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });

                        tbody.innerHTML += `
                            <tr>
                                <td class="fw-bold">${dataFormatada}</td>
                                <td>${ag.cliente.nome}</td>
                                <td>${ag.servico.nome}</td>
                                <td><span class="badge bg-warning text-dark px-2 py-1 rounded-pill">${ag.status}</span></td>
                                <td>
                                    <button class="btn btn-sm btn-success rounded-circle">✔</button>
                                    <button class="btn btn-sm btn-danger rounded-circle">✖</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                console.error("Erro ao buscar agendamentos", error);
            }
        }
        carregarAgendamentos();
    </script>
</body>

</html>
