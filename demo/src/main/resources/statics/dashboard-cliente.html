<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Área do Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F8F6F0;
            color: #333333;
        }

        .navbar-custom {
            background-color: #2C4E80;
            border-bottom: 3px solid #e0dcd3;
        }

        .navbar-brand,
        .nav-text {
            color: #F8F6F0 !important;
        }

        .card-custom {
            background-color: #ffffff;
            border: 1px solid #e0dcd3;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .text-primary-custom {
            color: #2C4E80;
        }

        .btn-custom {
            background-color: #2C4E80;
            color: #ffffff;
            font-weight: bold;
            border-radius: 20px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #1c365d;
            color: #ffffff;
        }

        .btn-outline-custom {
            border: 1px solid #2C4E80;
            color: #2C4E80;
            font-weight: bold;
            border-radius: 20px;
            transition: 0.3s;
        }

        .btn-outline-custom:hover {
            background-color: #2C4E80;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">💈 Barbearia VIP</a>
            <div class="d-flex align-items-center">
                <span id="nomeUsuario" class="me-3 nav-text fw-bold">Olá, Cliente</span>
                <button onclick="logout()"
                    class="btn btn-light btn-sm rounded-pill text-primary-custom fw-bold px-3">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h3 class="mb-4 text-primary-custom fw-bold">O que deseja fazer hoje?</h3>

        <div class="row g-4 text-center">
            <div class="col-md-6">
                <div class="card card-custom p-4 h-100 d-flex flex-column align-items-center">
                    <h4 class="text-primary-custom fw-bold mb-3">📅 Novo Agendamento</h4>
                    <p class="text-muted mb-4">Escolha um serviço, uma data e garanta seu horário conosco.</p>
                    <button class="btn btn-custom mt-auto w-75 py-2">Agendar Agora</button>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card card-custom p-4 h-100 d-flex flex-column align-items-center">
                    <h4 class="text-primary-custom fw-bold mb-3">🕒 Meus Horários</h4>
                    <p class="text-muted mb-4">Consulte os agendamentos que você já marcou e o status de cada um.</p>
                    <button class="btn btn-outline-custom mt-auto w-75 py-2">Ver Histórico</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const usuarioAtual = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioAtual || usuarioAtual.role !== 'CLIENTE') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('nomeUsuario').innerText = `Olá, ${usuarioAtual.nome.split(' ')[0]}`;
        }

        function logout() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
