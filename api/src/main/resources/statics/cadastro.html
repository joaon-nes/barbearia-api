<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F8F6F0;
            color: #333333;
        }

        .app-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-custom {
            background-color: #2C4E80;
            color: #ffffff;
            font-weight: bold;
            border-radius: 25px;
            padding: 12px;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #1c365d;
            color: #ffffff;
        }

        .form-floating .form-control {
            background-color: #F8F6F0;
            border: 1px solid #e0dcd3;
            border-radius: 10px;
            color: #333;
        }

        .form-floating label {
            color: #666;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #2C4E80;
            box-shadow: 0 0 0 0.25rem rgba(44, 78, 128, 0.25);
        }

        .text-primary-custom {
            color: #2C4E80;
        }

        .form-check-input:checked {
            background-color: #2C4E80;
            border-color: #2C4E80;
        }
    </style>
</head>

<body class="d-flex align-items-center min-vh-100 py-4">

    <div class="app-container w-100">
        <h2 class="text-center mb-4 text-primary-custom fw-bold">Criar Conta</h2>
        <p class="text-center text-muted mb-4">Preencha seus dados para começar.</p>

        <form id="formCadastro">
            <div class="mb-3 px-2">
                <label class="form-label text-muted mb-2 d-block">Eu sou um:</label>
                <div class="d-flex gap-4 flex-wrap">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipoConta" id="tipoCliente" value="CLIENTE"
                            checked>
                        <label class="form-check-label fw-bold" for="tipoCliente">Cliente</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipoConta" id="tipoEstabelecimento"
                            value="ESTABELECIMENTO">
                        <label class="form-check-label fw-bold" for="tipoEstabelecimento">Estabelecimento</label>
                    </div>
                </div>
            </div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nomeCadastro" placeholder="Seu Nome" required>
                <label for="nomeCadastro">Nome Completo</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailCadastro" placeholder="nome@exemplo.com" required>
                <label for="emailCadastro">E-mail</label>
            </div>

            <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="telefoneCadastro" placeholder="(00) 00000-0000" required>
                <label for="telefoneCadastro">Telefone / WhatsApp</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="senhaCadastro" placeholder="Senha" required>
                <label for="senhaCadastro">Senha</label>
            </div>

            <button type="submit" class="btn btn-custom w-100 mb-3">Criar Minha Conta</button>
        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="text-decoration-none text-muted">← Voltar para o Login</a>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
</body>

</html>
