<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber App - Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            background-color: #F8F6F0;
            color: #333333;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        .navbar-custom {
            background-color: #2C4E80;
            color: #ffffff;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            padding: 15px 20px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            border: 1px solid #e0dcd3;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background-color: #ffffff;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            text-align: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .nav-item.active {
            color: #2C4E80;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        .agendamento-card {
            background: white;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0dcd3;
            font-size: 1.05rem;
        }

        .agendamento-card h6 {
            font-size: 1.15rem;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        #view-barbearia {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            background: #F8F6F0;
            z-index: 1040;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .capa {
            height: 220px;
            background: #2C4E80;
            background-size: cover;
            background-position: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
        }

        .btn-back {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .time-badge {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #2C4E80;
            color: #2C4E80;
            font-weight: bold;
            cursor: pointer;
        }

        .time-badge.active {
            background: #2C4E80;
            color: white;
        }

        .time-badge.disabled {
            background: #eee;
            color: #ccc;
            border-color: #eee;
            text-decoration: line-through;
            cursor: not-allowed;
            pointer-events: none;
        }

        .date-card {
            min-width: 65px;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }

        .date-card.active {
            background: #2C4E80;
            color: white;
        }

        .tag-badge {
            background-color: #e2e8f0;
            color: #2C4E80;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            margin-right: 5px;
            display: inline-block;
        }

        .comodidade-badge {
            border: 1px solid #ddd;
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #555;
        }

        .star-rating i {
            font-size: 1.5rem;
            color: #ddd;
            cursor: pointer;
        }

        .star-rating i.active {
            color: #ffc107;
        }

        .social-icon {
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        .social-insta {
            color: #E1306C;
            background: #ffe4ec;
        }

        .social-insta:hover {
            background: #E1306C;
            color: white;
        }

        .social-fb {
            color: #1877F2;
            background: #e7f0fd;
        }

        .social-fb:hover {
            background: #1877F2;
            color: white;
        }

        .social-tk {
            color: #111111;
            background: #e6e6e6;
        }

        .social-tk:hover {
            background: #111111;
            color: white;
        }

        #modalImagemAmpliada {
            z-index: 1065 !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* boltar ao topo */
        #btnVoltarTopo {
            position: fixed;
            bottom: -60px;
            right: 20px;
            z-index: 1050;
            border: none;
            outline: none;
            background-color: #2C4E80;
            color: white;
            cursor: pointer;
            padding: 0;
            border-radius: 50%;
            
            font-size: 1.2rem;
            width: 38px;
            height: 38px;
            
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: bottom 0.3s ease-in-out, transform 0.2s;
        }

        #btnVoltarTopo.mostrar {
            bottom: 72px;
        }

        #btnVoltarTopo:active {
            transform: scale(0.9);
            background-color: #1a3052;
        }

        @media (min-width: 480px) {
            #btnVoltarTopo {
                right: calc(50% - 220px);
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div id="main-view">
            <div class="navbar-custom d-flex justify-content-between align-items-center mb-4">
                <h5 class="m-0 fw-bold">💈 Barber Discover</h5>
                <div id="headerAuth"></div>
            </div>
            <div class="container px-3">
                <div id="tab-descubra" class="tab-content active">
                    <div id="listaBarbearias"></div>
                </div>
                <div id="tab-agenda" class="tab-content">
                    <h5 class="fw-bold mb-3">Meus Agendamentos</h5>
                    <h6 class="fw-bold text-muted small mt-3 mb-2">Próximos</h6>
                    <div id="agsFuturos"></div>
                    <h6 class="fw-bold text-muted small mt-4 mb-2">Últimos</h6>
                    <div id="agsUltimos"></div>
                </div>
                <div id="tab-perfil" class="tab-content">
                    <div class="card card-custom p-4 text-center mb-3">
                        <div class="position-relative d-inline-block mx-auto mb-2">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 80px; height: 80px; font-size: 2rem; background-size: cover; background-position: center;"
                                id="letraAvatar">U</div>
                            <button class="btn btn-sm btn-light position-absolute bottom-0 end-0 rounded-circle shadow"
                                onclick="document.getElementById('inputFotoCliente').click()"><i
                                    class="bi bi-camera"></i></button>
                            <input type="file" id="inputFotoCliente" accept="image/*" style="display: none;"
                                onchange="alterarFotoCliente(event)">
                        </div>
                        <h5 id="nomePerfil" class="m-0">Usuário</h5>
                        <p class="text-muted small mb-0" id="emailPerfil"></p>
                    </div>

                    <div class="card card-custom p-3 mb-4">
                        <h6 class="fw-bold mb-3 border-bottom pb-2">Meus Dados</h6>
                        <div class="mb-2">
                            <label class="small fw-bold">Nome</label>
                            <input type="text" id="editNomeCliente" class="form-control form-control-sm">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Telefone / WhatsApp</label>
                            <input type="text" id="editTelCliente" class="form-control form-control-sm">
                        </div>
                        <button class="btn btn-primary btn-sm w-100 rounded-pill fw-bold"
                            onclick="salvarPerfilCliente()">Salvar Alterações</button>
                    </div>

                    <div class="text-center mt-4 mb-2">
                        <button onclick="logout()" class="btn btn-sm btn-outline-danger px-4 rounded-pill">
                            <i class="bi bi-box-arrow-right me-1"></i> Sair da Conta
                        </button>
                    </div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item active" onclick="mudarAba('descubra', this)">
                    <i class="bi bi-compass fs-4"></i><span>Explorar</span>
                </div>
                <div class="nav-item position-relative" onclick="mudarAba('agenda', this)">
                    <i class="bi bi-calendar-check fs-4"></i><span>Agendamentos</span>
                    <span id="badgeAgendamentosCliente"
                        class="position-absolute top-0 start-50 translate-middle badge rounded-pill bg-danger"
                        style="display: none; font-size: 0.6rem;">0</span>
                </div>
                <div class="nav-item" onclick="mudarAba('perfil', this)">
                    <i class="bi bi-person fs-4"></i><span>Perfil</span>
                </div>
            </div>
        </div>

        <div id="view-barbearia">
            <div class="capa" id="capaBar">
                <button onclick="fecharBarbearia()" class="btn-back">
                    <i class="bi bi-arrow-left"></i>
                </button>
            </div>
            <div class="container p-4" style="margin-top: -40px;">

                <div class="card card-custom p-4 shadow-sm mb-4">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h4 class="fw-bold text-primary-custom mb-0" id="nomeBar">Barbearia</h4>
                        <div id="badgeEstrelasTopo" style="display: none;"></div>
                    </div>
                    <div id="tagsBar" class="mb-3"></div>

                    <div class="d-flex align-items-center justify-content-between pt-3 border-top">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-whatsapp fs-5 text-success me-2"></i>
                            <span id="telBar" class="text-muted" style="font-size: 0.95rem;"></span>
                        </div>
                        <div id="sociaisBar" class="d-flex gap-2"></div>
                    </div>
                </div>

                <h6 class="fw-bold mb-3">Serviços</h6>
                <div class="card card-custom p-3 shadow-sm mb-4">
                    <div id="listaServicos"></div>
                    <button onclick="abrirModalAgendamento()"
                        class="btn btn-primary w-100 rounded-pill fw-bold mt-3 py-2">
                        <i class="bi bi-calendar-plus me-2"></i> Agendar Horário
                    </button>
                </div>

                <div id="sectionComodidades" style="display: none;">
                    <h6 class="fw-bold mb-3">Este espaço oferece</h6>
                    <div class="d-flex flex-wrap gap-2 mb-4" id="listaComodidades"></div>
                </div>

                <div class="card card-custom p-3 shadow-sm mb-4">
                    <h6 class="fw-bold"><i class="bi bi-geo-alt text-primary"></i> Localização</h6>
                    <p class="small text-muted mb-2" id="textoEnderecoBarbearia"></p>
                    <div id="mapaInline" onclick="abrirModalMapa()"
                        style="height: 150px; width: 100%; border-radius: 12px; z-index: 1; cursor: pointer; border: 1px solid #ddd;"
                        title="Clique para ampliar"></div>
                </div>

                <h6 class="fw-bold mb-3">Galeria</h6>
                <div class="d-flex overflow-x-auto gap-2 pb-2 mb-4" id="galeriaBar"></div>

                <h6 class="fw-bold mb-3" id="tituloAvaliacoesBar">Avaliações</h6>
                <div class="mb-5 pb-5" id="avaliacoesBar"></div>
                <button id="btnVoltarTopo" onclick="voltarAoTopo()" title="Voltar ao topo">
                    <i class="bi bi-arrow-up-short"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAgendamento" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-3">Agendar Horário</h5>
                    <label class="small fw-bold text-muted mb-1">1. Escolha o Serviço</label>
                    <select class="form-select mb-4 rounded-3" id="selectServico" onchange="aoMudarServico()">
                        <option value="">Selecione...</option>
                    </select>
                    <div id="areaDataHora" style="display: none;">
                        <label class="small fw-bold text-muted mb-1">2. Escolha a Data</label>
                        <div class="d-flex overflow-x-auto gap-2 pb-2 mb-4" id="modalDatas"></div>
                        <label class="small fw-bold text-muted mb-1">3. Escolha o Horário</label>
                        <div id="areaHorariosList" style="display: none;">
                            <h6 class="fw-bold small mb-2 mt-2">Manhã</h6>
                            <div class="d-flex flex-wrap gap-2 mb-3" id="modalHorasManha"></div>
                            <h6 class="fw-bold small mb-2">Tarde</h6>
                            <div class="d-flex flex-wrap gap-2 mb-4" id="modalHorasTarde"></div>
                        </div>
                    </div>
                    <button id="btnConfirmar" disabled onclick="finalizarReserva()"
                        class="btn btn-primary w-100 rounded-pill p-3 fw-bold mt-2">
                        Confirmar Agendamento
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAvaliar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-body p-4 text-center">
                    <h5 class="fw-bold mb-1">Avaliar Atendimento</h5>
                    <p class="small text-muted mb-3" id="nomeBarAvaliar"></p>
                    <div class="star-rating mb-3" id="estrelasContainer">
                        <i class="bi bi-star-fill" onclick="setNota(1)"></i>
                        <i class="bi bi-star-fill" onclick="setNota(2)"></i>
                        <i class="bi bi-star-fill" onclick="setNota(3)"></i>
                        <i class="bi bi-star-fill" onclick="setNota(4)"></i>
                        <i class="bi bi-star-fill" onclick="setNota(5)"></i>
                    </div>
                    <input type="hidden" id="notaSelecionada" value="0">
                    <input type="hidden" id="idAgendamentoAvaliar">
                    <textarea class="form-control mb-4 rounded-3" id="comentarioAvaliacao" rows="3"
                        placeholder="O que achou do serviço?"></textarea>
                    <button onclick="enviarAvaliacao()" class="btn btn-primary w-100 rounded-pill fw-bold">Enviar
                        Feedback</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalImagemAmpliada" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-header border-0 justify-content-end p-2">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-0">
                    <img id="imgAmpliadaSrc" src="" class="img-fluid rounded-3 shadow-lg" style="max-height: 80vh;">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalGaleriaCompleta" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header pb-2 border-bottom-0">
                    <h5 class="fw-bold m-0">Galeria de Fotos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-0">
                    <div class="d-flex flex-wrap gap-2 justify-content-center" id="gradeGaleriaCompleta"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalMapaCliente" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold mb-0">Localização</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-3">
                    <div
                        style="position: relative; width: 100%; height: 350px; border-radius: 12px; overflow: hidden; z-index: 1; border: 1px solid #ddd;">
                        <div id="mapaCliente" style="height: 100%; width: 100%;"></div>
                        <a id="btnAbrirGPS" href="#" target="_blank"
                            class="btn btn-success rounded-pill fw-bold shadow-lg"
                            style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; font-size: 1.05rem;">
                            <i class="bi bi-geo-alt-fill me-1"></i> Abrir no Maps
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('usuarioLogado'));
        let estCache = {}, servCache = {}, agsOcupados = [];
        let estSel, srvSelId, dataSel, horaSel, todosAgsGlobal = [];
        let idReagendamento = null;
        let mapaCli, markerCli;
        let mapaInline, markerInline;

        function formatarDataRelativa(dataStr) {
            if (!dataStr) return '';
            const dataObj = new Date(dataStr);
            const hoje = new Date();
            const diffTime = Math.abs(hoje - dataObj);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 0 && hoje.getDate() === dataObj.getDate()) return 'Hoje';
            if (diffDays === 1 || (diffDays === 0 && hoje.getDate() !== dataObj.getDate())) return 'Ontem';

            if (diffDays < 7) {
                const diasSemana = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
                return diasSemana[dataObj.getDay()];
            }
            return dataObj.toLocaleDateString('pt-PT');
        }

        function formatarTelefone(v) {
            if (!v) return "";
            v = v.replace(/\D/g, "");
            if (v.length === 11) return `(${v.slice(0, 2)}) ${v.slice(2, 3)} ${v.slice(3, 7)}-${v.slice(7)}`;
            if (v.length === 10) return `(${v.slice(0, 2)}) ${v.slice(2, 6)}-${v.slice(6)}`;
            return v;
        }

        const iconesComodidades = {
            "WiFi": "bi-wifi", "Ar-condicionado": "bi-snow", "Café": "bi-cup-hot",
            "Bebidas": "bi-cup-straw", "TV": "bi-tv", "Estacionamento": "bi-p-circle"
        };

        function renderizarPerfil() {
            let badge = user.contaVerificada ? ' <i class="bi bi-patch-check-fill text-primary" title="Conta Verificada"></i>' : '';
            document.getElementById('headerAuth').innerHTML = `Olá, ${user.nome.split(' ')[0]}${badge}`;
            document.getElementById('nomePerfil').innerHTML = `${user.nome}${badge}`;
            document.getElementById('emailPerfil').innerText = user.email;

            if (user.fotoPerfil) {
                document.getElementById('letraAvatar').innerText = '';
                document.getElementById('letraAvatar').style.backgroundImage = `url(${user.fotoPerfil})`;
            } else {
                document.getElementById('letraAvatar').innerText = user.nome.charAt(0).toUpperCase();
            }

            document.getElementById('editNomeCliente').value = user.nome;
            document.getElementById('editTelCliente').value = user.telefone || '';
        }

        async function alterarFotoCliente(e) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                document.getElementById('letraAvatar').innerText = '';
                document.getElementById('letraAvatar').style.backgroundImage = `url(${base64})`;
                await fetch(`http://localhost:8080/api/usuarios/${user.id}/foto`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fotoPerfil: base64 })
                });
                user.fotoPerfil = base64; localStorage.setItem('usuarioLogado', JSON.stringify(user));
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        async function salvarPerfilCliente() {
            const nome = document.getElementById('editNomeCliente').value;
            const tel = document.getElementById('editTelCliente').value;
            await fetch(`http://localhost:8080/api/usuarios/${user.id}/completar-perfil`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome: nome, telefone: tel })
            });
            user.nome = nome; user.telefone = tel;
            localStorage.setItem('usuarioLogado', JSON.stringify(user));
            alert("Perfil atualizado com sucesso!"); renderizarPerfil();
        }

        if (user) renderizarPerfil();
        else document.getElementById('headerAuth').innerHTML = `<a href="login.html" class="btn btn-sm btn-light rounded-pill px-3">Entrar</a>`;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function mudarAba(id, el) {
            if (!user && id !== 'descubra') { window.location.href = 'login.html'; return; }
            document.querySelectorAll('.tab-content, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            el.classList.add('active');
            if (id === 'agenda') carregarMeusAgs();
        }

        async function carregarBarbearias() {
            try {
                const resAgs = await fetch('http://localhost:8080/api/agendamentos');
                todosAgsGlobal = await resAgs.json();

                const resU = await fetch('http://localhost:8080/api/usuarios');
                const ests = (await resU.json()).filter(u => u.role === 'ESTABELECIMENTO' && u.perfilCompleto);

                const container = document.getElementById('listaBarbearias');
                container.innerHTML = '';

                for (let e of ests) {

        function selData(iso, dIdx) {
            dataSel = iso; horaSel = null;
            document.getElementById('btnConfirmar').disabled = true;
            document.querySelectorAll('.date-card').forEach(x => x.classList.remove('active'));
            document.getElementById(`d-${iso}`).classList.add('active');
            document.getElementById('areaHorariosList').style.display = 'block';

            let srvInfo = servCache[estSel.id].find(x => x.id == srvSelId);
            let srvDuracao = srvInfo ? srvInfo.duracaoMinutos : 30;

            const diasL = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
            let config = JSON.parse(estSel.horariosFuncionamento || '[]').find(x => x.dia === diasL[dIdx == 0 ? 6 : dIdx - 1]);

            const mDiv = document.getElementById('modalHorasManha');
            const tDiv = document.getElementById('modalHorasTarde');
            mDiv.innerHTML = ''; tDiv.innerHTML = '';

            let diasFechadosStr = estSel.diasFechados || "";
            if (diasFechadosStr.includes(iso)) {
                mDiv.innerHTML = '<small class="text-danger fw-bold"><i class="bi bi-door-closed"></i> Estabelecimento Fechado neste dia</small>';
                return;
            }

            if (!config || (!config.abertura1 && !config.abertura2)) {
                mDiv.innerHTML = '<small class="text-danger">Fechado</small>'; return;
            }

            const agora = new Date();
            const hojeIso = new Date(agora.getTime() - (agora.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const hrAtual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');

            let intervalosOcupados = [];
            agsOcupados.forEach(a => {
                let addIntervalo = (dataHoraStr) => {
                    if (dataHoraStr && dataHoraStr.startsWith(iso)) {
                        let [h, m] = dataHoraStr.split('T')[1].substring(0, 5).split(':').map(Number);
                        let start = (h * 60) + m;
                        let dur = a.servico?.duracaoMinutos || 30;
                        intervalosOcupados.push({ start: start, end: start + dur });
                    }
                };
                addIntervalo(a.dataHoraInicio);
                addIntervalo(a.dataHoraProposta);
            });

            const isBl = (t) => {
                if (iso === hojeIso && t <= hrAtual) return true;
                let [th, tm] = t.split(':').map(Number);
                let start = (th * 60) + tm;
                let end = start + srvDuracao;

                for (let inter of intervalosOcupados) {
                    if (start < inter.end && end > inter.start) return true;
                }
                return false;
            };

            function addS(ab, fe, tg) {
                if (!ab || !fe) { tg.innerHTML = '<small class="text-muted">Sem horários</small>'; return; }
                let [h, m] = ab.split(':').map(Number);
                let [fh, fm] = fe.split(':').map(Number);
                let hs = false;

                while (h < fh || (h === fh && m < fm)) {
                    let t = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    let bl = isBl(t);
                    tg.innerHTML += `<div class="time-badge ${bl ? 'disabled' : ''}" onclick="${bl ? '' : 'selHora(\'' + t + '\', this)'}">${t}</div>`;
                    hs = true;
                    m += 30; if (m >= 60) { m = 0; h++; }
                }
                if (!hs) tg.innerHTML = '<small class="text-muted">Indisponível</small>';
            }

            addS(config.abertura1, config.fechamento1, mDiv);
            addS(config.abertura2, config.fechamento2, tDiv);
        }

        async function finalizarReserva() {
            try {
                let url = 'http://localhost:8080/api/agendamentos';
                let method = 'POST';
                let bodyData = {
                    dataHoraInicio: `${dataSel}T${horaSel}:00`,
                    cliente: { id: user.id, role: 'CLIENTE' },
                    estabelecimento: { id: estSel.id, role: 'ESTABELECIMENTO' },
                    servico: { id: parseInt(srvSelId) }
                };

                if (idReagendamento) {
                    url = `http://localhost:8080/api/agendamentos/${idReagendamento}/propor-reagendamento`;
                    method = 'PUT';
                    bodyData = { dataHoraProposta: `${dataSel}T${horaSel}:00`, quemSugeriu: "CLIENTE" };
                }

                const response = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });

                if (!response.ok) {
                    const errorData = await response.json();
                    alert("Erro: " + (errorData.erro || "Horário Indisponível")); return;
                }

                alert(idReagendamento ? "Proposta de novo horário enviada à barbearia!" : "Agendamento confirmado com sucesso!");
                location.reload();
            } catch (error) { alert("Erro de comunicação."); }
        }

        async function carregarMeusAgs() {
            const res = await fetch('http://localhost:8080/api/agendamentos');
            const meus = (await res.json()).filter(a => a.cliente?.id === user.id).sort((a, b) => b.dataHoraInicio.localeCompare(a.dataHoraInicio));

            const pendentes = meus.filter(m => m.status === 'REAGENDAMENTO_PENDENTE' && m.quemSugeriuReagendamento === 'ESTABELECIMENTO');
            if (pendentes.length > 0) {
                document.getElementById('badgeAgendamentosCliente').innerText = pendentes.length;
                document.getElementById('badgeAgendamentosCliente').style.display = 'block';
            }

            const futuros = meus.filter(m => m.status === 'AGENDADO' || m.status === 'REAGENDAMENTO_PENDENTE');
            const ultimos = meus.filter(m => m.status === 'CONCLUIDO' || m.status === 'CANCELADO');

            const renderCard = (m) => {
                const dt = new Date(m.dataHoraInicio);
                let cor = m.status === 'CONCLUIDO' ? "#198754" : m.status === 'CANCELADO' ? "#dc3545" : m.status === 'REAGENDAMENTO_PENDENTE' ? "#fd7e14" : "#ffc107";
                let label = m.status === 'CONCLUIDO' ? "Concluído" : m.status === 'CANCELADO' ? "Cancelado" : m.status === 'REAGENDAMENTO_PENDENTE' ? "Pendente" : "Agendado";

                let btnAcao = '';
                if (m.status === 'AGENDADO' || (m.status === 'REAGENDAMENTO_PENDENTE' && m.quemSugeriuReagendamento === 'CLIENTE')) {
                    let txtAguardando = m.status === 'REAGENDAMENTO_PENDENTE' ? '<div class="text-center small text-warning mt-2 fw-bold">Aguardando confirmação...</div>' : '';
                    btnAcao = `
                        ${txtAguardando}
                        <div class="d-flex gap-2 mt-3">
                            <button onclick="iniciarReagendamento(${m.id}, ${m.estabelecimento?.id}, ${m.servico?.id})" class="btn btn-sm btn-primary w-50 rounded-pill fw-bold">Remarcar</button>
                            <button onclick="cancAg(${m.id})" class="btn btn-sm btn-outline-danger w-50 rounded-pill">Cancelar</button>
                        </div>`;
                } else if (m.status === 'REAGENDAMENTO_PENDENTE' && m.quemSugeriuReagendamento === 'ESTABELECIMENTO') {
                    const dtProp = new Date(m.dataHoraProposta);
                    btnAcao = `
                        <div class="alert alert-warning p-2 mt-2 small border-0">
                            <strong>Atenção!</strong> A barbearia sugeriu um novo horário:<br>
                            <i class="bi bi-calendar"></i> ${dtProp.toLocaleDateString()} às ${dtProp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </div>
                        <div class="d-flex gap-2 mt-2">
                            <button onclick="aceitarProposta(${m.id})" class="btn btn-sm btn-success w-50 rounded-pill fw-bold">Aceitar</button>
                            <button onclick="iniciarReagendamento(${m.id}, ${m.estabelecimento?.id}, ${m.servico?.id})" class="btn btn-sm btn-outline-primary w-50 rounded-pill">Outro horário</button>
                        </div>`;
                } else if (m.status === 'CONCLUIDO' && !m.notaAvaliacao) {
                    btnAcao = `<button onclick="abrirModalAvaliar(${m.id}, '${m.estabelecimento?.nomeBarbearia}')" class="btn btn-sm btn-outline-primary w-100 rounded-pill mt-2"><i class="bi bi-star"></i> Avaliar</button>`;
                }

                return `
                    <div class="agendamento-card">
                        <div class="d-flex justify-content-between mb-2">
                            <div><h6 class="fw-bold m-0">${m.servico?.nome}</h6><small class="text-muted">${m.estabelecimento?.nomeBarbearia}</small></div>
                            <span class="status-badge" style="background: ${cor}22; color: ${cor}">${label}</span>
                        </div>
                        <div class="small text-muted"><i class="bi bi-calendar3"></i> ${dt.toLocaleDateString()} <i class="bi bi-clock ms-2"></i> ${dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        ${btnAcao}
                    </div>`;
            };

            document.getElementById('agsFuturos').innerHTML = futuros.length ? futuros.map(renderCard).join('') : '<p class="small text-muted">Nenhum agendamento futuro.</p>';
            document.getElementById('agsUltimos').innerHTML = ultimos.length ? ultimos.map(renderCard).join('') : '<p class="small text-muted">Nenhum histórico.</p>';
        }

        async function cancAg(id) {
            if (!confirm("Cancelar horário?")) return;
            await fetch(`http://localhost:8080/api/agendamentos/${id}/status`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'CANCELADO' }) });
            carregarMeusAgs();

            for (let i = 0; i < 5; i++) { if (i < n) s[i].classList.add('active'); else s[i].classList.remove('active'); }
        }

        async function enviarAvaliacao() {
            let i = document.getElementById('idAgendamentoAvaliar').value;
            let n = document.getElementById('notaSelecionada').value;
            let c = document.getElementById('comentarioAvaliacao').value;
            if (n == 0) { alert("Selecione as estrelas!"); return; }
            await fetch(`http://localhost:8080/api/agendamentos/${i}/avaliar`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nota: parseInt(n), comentario: c }) });
            alert("Enviado!"); location.reload();
        }

        async function aceitarProposta(id) {
            await fetch(`http://localhost:8080/api/agendamentos/${id}/confirmar-reagendamento`, { method: 'PUT' });
            alert("Horário confirmado!"); location.reload();
        }

        function verificarScroll() {
            const btnTopo = document.getElementById("btnVoltarTopo");
            if (!btnTopo) return;

            const appContainer = document.querySelector('.app-container');

            let scrollPos = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || (appContainer ? appContainer.scrollTop : 0);

            if (scrollPos > 300) {
                btnTopo.classList.add("mostrar");
            } else {
                btnTopo.classList.remove("mostrar");
            }
        }

        window.addEventListener('scroll', verificarScroll, { passive: true });
        document.addEventListener('scroll', verificarScroll, { passive: true });
        document.body.addEventListener('scroll', verificarScroll, { passive: true });

        const caixaApp = document.querySelector('.app-container');
        if (caixaApp) caixaApp.addEventListener('scroll', verificarScroll, { passive: true });

        function voltarAoTopo() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.documentElement.scrollTo({ top: 0, behavior: 'smooth' });
            document.body.scrollTo({ top: 0, behavior: 'smooth' });
            if (caixaApp) caixaApp.scrollTo({ top: 0, behavior: 'smooth' });
        }

        carregarBarbearias();
    </script>
</body>

</html>
