# Configurações de conexão
spring.datasource.url=jdbc:mysql://localhost:3306/barbearia_db?useTimezone=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.org.hibernate=WARN
logging.level.org.springframework.orm.jpa=WARN

# Configurações de E-mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Limites para envio de ficheiros e textos (Base64)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# Otimização de performance
spring.jpa.open-in-view=false

# Configuração da AbacatePay
abacatepay.api.key=${ABACATEPAY_API_KEY}
abacatepay.webhook.secret=${ABACATEPAY_WEBHOOK_SECRET}

# Configuração de Segurança JWT
jwt.secret=${JWT_SECRET}